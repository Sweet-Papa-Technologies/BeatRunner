# FoFo provenance — who authored what (Author != Judge enforced by native subagent contexts).
units:
  - unit: core/timing
    tests_by: fofo-judge (spec-only subagent)
    code_by: author (main context)
  - unit: core/scoring
    tests_by: fofo-judge (spec-only subagent)
    code_by: author (main context)
  - unit: core/beatmap
    tests_by: fofo-judge (spec-only subagent)
    code_by: author (main context)
  - unit: core/run
    tests_by: fofo-judge (spec-only subagent)
    code_by: author (main context)

  # BEATFORGE (IMPROVE.MD) — Author != Judge holds across MODEL invocations too.
  # The chart designer and the chart critic are SEPARATE Gemini 3.5 Flash calls
  # with separate contexts (REQ-QA-04); deterministic gates referee both.
  - unit: beatforge/chart-designer
    role: Author
    model: gemini-3.5-flash (audio input, thinkingLevel=high, global/v1beta1)
    context: track audio + analysis.json + design brief + difficulty budget
    code_by: author (main context)
    tests_by: pytest tools/beatforge/tests (offline, InMemoryBackend)
  - unit: beatforge/chart-critic
    role: Judge
    model: gemini-3.5-flash (audio input, thinkingLevel=high, global/v1beta1)
    context: FRESH — track audio + final resolved chart only; never sees the
             designer's working context (REQ-QA-04)
    code_by: author (main context)
  - unit: beatforge/ar-critic
    role: Judge (Workstream A)
    model: gemini-3.5-flash (audio input) — scores Lyria candidate chartability
    context: candidate audio + brief; separate from generation
  - unit: beatforge/dsp-truth
    role: deterministic referee
    context: numpy/scipy DSP (local) or madmom+Demucs (Colab); no model involved
    code_by: author (main context)
    tests_by: pytest tools/beatforge/tests/test_dsp.py

  # SABERFORGE (BEATSABER.SPEC.MD) — TargetAdapter #2. Author != Judge holds across
  # model invocations here too: the Beat Saber intent designer and the map critic
  # are SEPARATE Gemini 3.5 Flash calls with separate contexts (REQ-BS-11);
  # deterministic referees (parity validator + in-core swing simulator) referee both.
  - unit: beatforge/beatsaber/map-designer
    role: Author
    model: gemini-3.5-flash (audio input, thinkingLevel=high, global/v1beta1)
    context: track audio + analysis.json + design brief + difficulty budget;
             emits INTENT only (onset refs + kind + hand + phrase feel) — never
             grid coordinates, cut directions, or parity
    code_by: author (main context)
    tests_by: pytest tools/beatforge/tests/test_saberforge.py (offline; model/Colab/
              external checkers behind fixtures)
  - unit: beatforge/beatsaber/map-critic
    role: Judge
    model: gemini-3.5-flash (audio input, thinkingLevel=high, global/v1beta1)
    context: FRESH — track audio + the realized map rendered as a per-hand swing
             sequence only; never sees the designer's working context (REQ-BS-11)
    code_by: author (main context)
  - unit: beatforge/beatsaber/parity-realizer
    role: deterministic referee (beatable-by-construction)
    context: swing-parity DP (parity.py/realize.py) + ScoreSaber-criteria validator
             + in-core swing simulator (simulate.py); no model involved
    code_by: author (main context)
    tests_by: pytest tools/beatforge/tests/test_saberforge.py
  - unit: beatforge/beatsaber/ai-assisted-label
    role: positioning constraint (REQ-POS-01..03)
    context: every emitted Info/beatmap carries credit "SABERFORGE (AI-assisted
             draft)"; own-music default; no BeatSaver upload path exists
    code_by: author (main context)
