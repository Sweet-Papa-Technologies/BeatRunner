; StepCapture — a recording-only theme.
;
; It inherits everything from Simply Love (see Theme.ini) so gameplay LOOKS
; exactly like a normal Simply Love session. All it changes is the flow:
;
;   ScreenStepCapture  ->  ScreenGameplay  ->  ScreenStepCapture  ->  ...
;
; The title menu, song wheel, and evaluation screen are never visited. The
; gameplay -> runner return trip is done by overriding Branch.AfterGameplay()
; in "Scripts/99 StepCapture.lua" (both _fallback and Simply Love resolve the
; [ScreenGameplay] NextScreen metric through that function, so overriding the
; function is enough — no metric override needed).

[Common]
InitialScreen="ScreenStepCapture"

[ScreenStepCapture]
Class="ScreenWithMenuElements"
Fallback="ScreenWithMenuElementsBlank"
NextScreen="ScreenGameplay"
PrevScreen="ScreenStepCapture"
TimerSeconds=-1
ShowHelp=false
